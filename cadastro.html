<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg">

    <a href="index.html" class="btn-voltar">←</a>

    <div class="container center">

        <div class="card">

            <h1 class="titulo-card">CADASTRO</h1>

            <form action="php/cadastrar.php" method="POST">

                <input type="text" name="nome" placeholder="INSIRA SEU NOME DE USUÁRIO..." class="input">

                <input type="password" name="senha" placeholder="INSIRA SUA SENHA..." class="input">

                <input type="password" name="confirmar" placeholder="CONFIRME SENHA..." class="input">

                <select name="turma" class="input">
                    <option value="">SELECIONE A TURMA</option>
                    <option value="1">Turma A</option>
                    <option value="2">Turma B</option>
                </select>

                <div class="btn-container">
                    <button type="submit" class="btn">CADASTRAR</button>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
